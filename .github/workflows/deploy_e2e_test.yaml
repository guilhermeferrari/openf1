# Variação do workflow de teste e2e que simula falha após aprovação.
#
# Copiar para .github/workflows/ do repositório de teste e configurar:
#   - Um environment chamado "prd" com protection rule de aprovação manual
#   - No config do bot: file: deploy_e2e_test_fail.yaml / environment: prd
#     (ou usar o mesmo environment "prd" com arquivo diferente)
#
# Fluxo esperado no Slack:
#   ⏳ Em andamento  → (20s de delay visível)
#   🟠 Aguardando revisão  → (aguarda aprovação manual no GitHub)
#   🔵 Aprovado — em andamento  → (10s de delay visível)
#   ❌ Falha

name: Deploy E2E Test (failure)
run-name: "e2e test — deploy FAIL by @${{ github.actor }}"

on:
  push:
    branches: 
      - "main"

jobs:
  pre-deploy:
    name: Pre-deploy checks
    runs-on: ubuntu-latest
    steps:
      - name: Simulating pre-deploy work
        run: |
          echo "Running pre-deploy checks..."
          sleep 10
          echo "Pre-deploy checks complete."

  deploy:
    name: Deploy to prd
    runs-on: ubuntu-latest
    needs: [pre-deploy]
    environment: prd   # ← este campo dispara o workflow_job "waiting" (approval gate)
    steps:
      - name: Simulating deployment
        run: |
          echo "Approved! Deploying to production..."
          sleep 10
          echo "Simulating deployment failure..."
          exit 1

          